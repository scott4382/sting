function fmt(s) {
return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
}

// Display label for a slot: strip trailing digits so “DEF1”→”DEF”, “GK”→”GK”
function slotLabel(slotId) {
return (slotId || “”).replace(/\d+$/, “”);
}

// ─── Rotation logic ───────────────────────────────────────────────────────────
function prefOnly(p, role) { const pr = p.prefRoles || []; return pr.length > 0 && pr.includes(role); }
function prefAny(p)         { return !p.prefRoles || p.prefRoles.length === 0; }

/**

- Segment templates per squad size (N = total present, including GK).
- 
- Each template is an array of segment-arrays, one per player, sorted by
- total minutes DESC (most minutes → assigned to player with least accumulated
- time, so playing time stays balanced across games).
- 
- Design goals, in priority order:
- 1. GK plays the full half — always.
- 1. Zero outfield players play 25 min straight — unless N=7 (no bench, unavoidable).
- 1. Minimise the number of outfield players who play 25 min total.
- 1. No outfield player is on field for more than 15 consecutive minutes.
- 1. Playing time as equal as possible across the outfield.
- 
- Every template has been mathematically verified: at each sub window {5,10,15,20}
- the number of players leaving the field equals the number entering, and exactly
- 7 players are on field at all times.
- 
- Summary of unavoidable full-half outfield players per N:
- N=7  → 6 full (no bench, nothing we can do)
- N=8  → 3 full (1 bench player can only shuttle 3 rests)
- N=9  → 2 full (2 bench = 4 rest slots, 2 left over)
- N=10 → 1 full (3 bench = 6 rest slots but transition crunch at t=10 wastes 1)
- N=11 → 0 full (4 bench = exactly enough to rest all 6 outfield)
- N=12 → 0 full (5 bench = all rested, extra bench gets a late cameo)

  ],

  [[0,5],[10,25]],             // rest  5-10  (20 min, consec 15)     ✓
  [[0,15],[20,25]],            // rest 15-20  (20 min, consec 15)     ✓
  [[0,15],[20,25]],            // rest 15-20  (20 min, consec 15)     ✓
  [[0,25]],[[0,25]],          // 2 unavoidable full outfield          ✗
  [[5,10],[15,20]],            // bench shuttle (10 min, consec 5)    ✓

/** Returns sub info for display purposes (game-plan summary banner). */
function getSubInfo(N) {
const tmpl = HALF_TEMPLATES[N] || HALF_TEMPLATES[7];
const windows = [5, 10, 15, 20];
const counts = {};
for (const segs of tmpl) {
for (const [a, b] of segs) {
if (windows.includes(a)) counts[a] = (counts[a] || 0) + 1;
}
}
const total = Object.values(counts).reduce((s, v) => s + v, 0);
const desc  = windows.filter(w => counts[w]).map(w => counts[w] > 1 ? `${w}′×${counts[w]}` : `${w}′`).join(”, “);
return { total, desc };
}

/** Total minutes in a segment list */
function segMins(segs)   { return segs.reduce((s, [a, b]) => s + b - a, 0); }
/** Max consecutive minutes in a segment list */
function segMaxC(segs)   { return Math.max(…segs.map(([a, b]) => b - a)); }
/** True if player is on field at minute t (open interval: [a,b) means on during [a, b) ) */
function onAt(segs, t)   { return segs.some(([a, b]) => a <= t && t < b); }

/**

- Build the complete half plan — lineup + sub schedule.
- 
- Algorithm:
- 1. Look up the segment template for N players.
- 1. Sort templates by total minutes DESC (ties broken by max-consecutive ASC).
- 1. Sort players by accumulated time ASC. Assign: most-minutes template → least-time player.
- 1. Enforce GK swap: the designated GK player must get the GK (full-half) template.
- 1. Assign field positions by player preference.
- 1. Derive the sub schedule from segment boundaries: at each window t,
- ```
   players whose segment ends at t go OFF, players whose segment starts at t come ON.
  ```

*/
function buildHalfPlan(present, formation, gameSec = {}, prevGkId = null, seed = 0) {
const N = present.length;

// ── Step 1: load and sort segment templates ──────────────────────────────
const rawTemplates = HALF_TEMPLATES[N] || HALF_TEMPLATES[7];

// Seeded LCG random — deterministic per seed, different across seeds
let rng = (seed * 1664525 + 1013904223) & 0xffffffff;
const rand = () => { rng = (rng * 1664525 + 1013904223) & 0xffffffff; return (rng >>> 0) / 0xffffffff; };

// Sort: most playing time first; ties → shorter max consecutive.
// Within same-duration groups, shuffle by seed so reshuffling redistributes
// playing time across different players each time.
const withRand = rawTemplates.map((t, i) => ({ t, mins: segMins(t), maxC: segMaxC(t), r: rand() }));
withRand.sort((a, b) => b.mins - a.mins || a.maxC - b.maxC || a.r - b.r);
const templates = withRand.map(x => x.t);

// ── Step 2: sort players by accumulated time, ascending ──────────────────
// Within equal-time groups, use a seeded shuffle so regeneration gives variety.
const totalSec = p => (p.totalTime || 0) + (gameSec[p.id] || 0);
const sorted = […present].sort((a, b) => {
const diff = totalSec(a) - totalSec(b);
if (diff !== 0) return diff;
return rand() - 0.5;  // random tiebreak → regeneration yields variety
});

// ── Step 3: pair players with templates (most minutes → least-time player)
const assignments = sorted.map((p, i) => ({ p, segs: templates[i] }));

// ── Step 4: enforce GK assignment ────────────────────────────────────────
// The GK template is always [[0,25]] (index 0 after sort).
// Find the best GK candidate and swap them into position 0.
const gkCandidates = present.filter(p => prefOnly(p, “GK”));
const nonPrev      = (arr) => arr.filter(p => p.id !== prevGkId);

let gkPlayer;
if (gkCandidates.length > 0) {
// Dedicated GK players: prefer the one who didn’t play GK last half, then least time
const pool = nonPrev(gkCandidates).length > 0 ? nonPrev(gkCandidates) : gkCandidates;
pool.sort((a, b) => {
const diff = totalSec(a) - totalSec(b);
if (diff !== 0) return diff;
return rand() - 0.5;
});
gkPlayer = pool[0];
} else {
// No dedicated GK — rotate by posHistory: pick the player who has played GK LEAST
// (excluding the previous half’s GK so someone else always gets a turn)
const pool = nonPrev(sorted).length > 0 ? nonPrev(sorted) : sorted;
const gkHist = p => (p.posHistory || {}).GK || 0;
const poolSorted = […pool].sort((a, b) => {
const histDiff = gkHist(a) - gkHist(b);
if (histDiff !== 0) return histDiff;
const timeDiff = totalSec(a) - totalSec(b);
if (timeDiff !== 0) return timeDiff;
return rand() - 0.5;
});
gkPlayer = poolSorted[0];
}

// Swap only the player into slot 0, keeping each slot’s segs intact.
// (Swapping the whole object would give the GK a bench template — bug.)
const gkAssignIdx = assignments.findIndex(a => a.p.id === gkPlayer.id);
if (gkAssignIdx !== 0) {
const tmp = assignments[0].p;
assignments[0].p = assignments[gkAssignIdx].p;
assignments[gkAssignIdx].p = tmp;
}

// ── Step 5: assign field positions using position-history rotation ───────
// Starters = players whose first segment starts at 0
const onFieldIds  = assignments.filter(a => a.segs[0][0] === 0).map(a => a.p.id);
const offFieldIds = assignments.filter(a => a.segs[0][0] > 0).map(a => a.p.id);

const fmtSlots = formation.slots;
const pm       = {};  // slotId -> pid
const used     = new Set();

// Score a candidate for a given role:
//   Lower score = stronger candidate (want to minimise role count for that role)
//   1st: saturation = times_played / slots_of_this_role_in_formation (normalises GK vs MID)
//   2nd: preference match (prefers this role = 0, any = 1, wrong = 2, strict GK elsewhere = 3)
//   3rd: total playing time (least = bonus)
//   4th: seeded random tiebreak for game-to-game variety
const posHist = p => p.posHistory || {};
const slotCountFor = role => fmtSlots.filter(s => s.role === role).length || 1;
const roleScore = (p, role) => {
const saturation = (posHist(p)[role] || 0) / slotCountFor(role);
let prefScore;
if (prefOnly(p, role))                             prefScore = 0;  // wants this role
else if (prefAny(p))                               prefScore = 1;  // flexible
else if (!prefOnly(p, role) && !prefOnly(p, “GK”)) prefScore = 2;  // has prefs, not this role
else                                               prefScore = 3;  // strict GK, wrong role
return [saturation, prefScore, totalSec(p), rand()];
};
const compareTuples = (a, b) => {
for (let i = 0; i < a.length; i++) { if (a[i] !== b[i]) return a[i] - b[i]; }
return 0;
};
const pickFor = (slotRole, candidateIds) => {
const cands = candidateIds.map(id => present.find(p => p.id === id)).filter(Boolean).filter(p => !used.has(p.id));
if (cands.length === 0) return null;
cands.sort((a, b) => compareTuples(roleScore(a, slotRole), roleScore(b, slotRole)));
return cands[0];
};

const gkSlot = fmtSlots.find(s => s.role === “GK”);
if (gkSlot) { pm[gkSlot.id] = gkPlayer.id; used.add(gkPlayer.id); }

const fieldCandidates = onFieldIds.filter(id => !used.has(id));
for (const role of [“DEF”, “MID”, “FWD”]) {
for (const slot of fmtSlots.filter(s => s.role === role)) {
const pick = pickFor(role, fieldCandidates.filter(id => !used.has(id)));
if (pick) { pm[slot.id] = pick.id; used.add(pick.id); }
}
}

// pid -> slotId (starters only; incoming subs inherit the slot they fill)
const posMap = {};
Object.entries(pm).forEach(([slotId, pid]) => { posMap[pid] = slotId; });

// ── Step 6: derive substitution schedule from segment boundaries ──────────
// At each window t:
//   players going OFF  = those with a segment ending at t
//   players coming ON  = those with a segment starting at t
// The slot an incoming player fills = the slot vacated by the outgoing player.
const subs = [];
for (const t of [5, 10, 15, 20]) {
const goingOff = assignments.filter(a => a.segs.some(([, b]) => b === t));
const comingOn = assignments.filter(a => a.segs.some(([start]) => start === t));

```
// Track slot availability as off-players free their slots
const freeSlots = goingOff.map(a => {
  // The current slot of this player: either their original slot (from posMap)
  // or inherited from a prior sub (we'll look it up from the running posMap).
  return posMap[a.p.id] ?? null;
});

comingOn.forEach((onAss, i) => {
  const offAss = goingOff[i];
  if (!offAss) return;
  const slot = freeSlots[i];
  subs.push({ minute: t, outId: offAss.p.id, inId: onAss.p.id, slot });
  // Update posMap so later windows inherit the right slot
  if (slot) { delete posMap[offAss.p.id]; posMap[onAss.p.id] = slot; }
});
```

}

subs.sort((a, b) => a.minute - b.minute);

// pm was mutated during step 6 to track running slot assignments.
// Rebuild posMap (pid->slotId) from final pm state (slotId->pid).
const finalPosMap = {};
Object.entries(pm).forEach(([slotId, pid]) => { finalPosMap[pid] = slotId; });
return { posMap: finalPosMap, starters: onFieldIds, bench: offFieldIds, subs };
}

// ─── Full game simulation ─────────────────────────────────────────────────────
function simulateFullGame(present, formation, seed = 0) {
const intervals    = []; // {pid, half, startMin, endMin, slot}
const halfSubs     = { 1: [], 2: [] };
let   prevGkId     = null;
let   extraSecGame = {}; // seconds accrued this game so far

for (const half of [1, 2]) {
// Use seed for H1, seed+1 for H2 so both halves vary on reshuffle
const halfSeed = seed + (half - 1);
const { posMap: pm, starters, bench, subs } = buildHalfPlan(present, formation, extraSecGame, prevGkId, halfSeed);
halfSubs[half] = subs;
// Track GK for mandatory halftime swap — pm is pid→slotId, so find pid where value === gkSlot.id
const gkSlot = formation.slots.find(s => s.role === “GK”);
prevGkId = gkSlot ? Number(Object.entries(pm).find(([, slotId]) => slotId === gkSlot.id)?.[0]) : null;

let lastMinute     = 0;

const flush = (until) => {

for (const sub of subs) {

const [manIn,         setManIn]         = useState(””);
const [gamePlanSeed,  setGamePlanSeed]  = useState(1);
const [ourScore,      setOurScore]      = useState(0);
const [theirScore,    setTheirScore]    = useState(0);
const [rosterSort,    setRosterSort]    = useState(“name”); // “name” | “number”
const [showExport,    setShowExport]    = useState(false);
const [importText,    setImportText]    = useState(””);
const [showImport,    setShowImport]    = useState(false);
const [tapSubOut,     setTapSubOut]     = useState(null); // pid tapped to sub out on field

const timerRef   = useRef(null);
const sessionRef = useRef({});
const fieldRef   = useRef([]);
const posRef     = useRef({});
// slotLogRef: accumulates { pid, role } pairs for the current half, committed at halftime/fulltime
const slotLogRef = useRef([]);

useEffect(() => { try { localStorage.setItem(“sqb6_players”, JSON.stringify(players)); } catch {} }, [players]);
useEffect(() => { localStorage.setItem(“sqb6_form”, formKey); }, [formKey]);
useEffect(() => { try { localStorage.setItem(“sqb6_games”, JSON.stringify(games)); } catch {} }, [games]);
useEffect(() => { fieldRef.current = onField; }, [onField]);
useEffect(() => { posRef.current   = posMap;  }, [posMap]);

const formation = FORMATIONS[formKey];
const present   = players.filter(p => p.present);
const getPlayer = id => players.find(p => p.id === id || p.id === Number(id));
const getName   = id => { const p = getPlayer(id); return p ? `${p.number ? "#" + p.number + " " : ""}${p.name}` : “?”; };

// Roster ops
const addPlayer    = () => {
if (!newName.trim()) return;
setPlayers(ps => […ps, { id: Date.now(), name: newName.trim(), number: newNumber.trim(), prefRoles: [], totalTime: 0, games: 0, present: true, posHistory: { GK: 0, DEF: 0, MID: 0, FWD: 0 } }]);
setNewName(””); setNewNumber(””);
};
const updatePlayer = (id, changes) => setPlayers(ps => ps.map(p => p.id === id ? { …p, …changes } : p));
const removePlayer = id => setPlayers(ps => ps.filter(p => p.id !== id));
const togglePresent = id => updatePlayer(id, { present: !players.find(p => p.id === id)?.present });

// ── Build one half’s lineup + sub schedule ───────────────────────────────
const buildAll = (extraSecGame = {}, prevGkId = null, seed = 0) => {
return buildHalfPlan(present, formation, extraSecGame, prevGkId, seed);
};

const doPreview = (seed = Date.now()) => { setPreview(buildAll({}, null, seed)); setView(“lineup”); };

// ── Commit position history for the half just completed ───────────────────
// posMap: { pid -> slotId }  formation.slots: [{ id, role }]
// We build a { pid -> role } map from the actual posMap at end of half, then
// also fold in any slots held during the half via completedSubs.
// Simplest accurate approach: derive from slotLog accumulated during the half.
const commitPosHistory = (log) => {
// log = [{ pid, role }] — one entry per slot-stint this half
// Deduplicate: count each unique (pid, role) pair once per half
const seen = new Set();
const delta = {}; // pid -> { role: count }
log.forEach(({ pid, role }) => {
const key = `${pid}:${role}`;
if (seen.has(key)) return;
seen.add(key);
if (!delta[pid]) delta[pid] = {};
delta[pid][role] = (delta[pid][role] || 0) + 1;
});
setPlayers(ps => ps.map(p => {
if (!delta[p.id]) return p;
const ph = { GK: 0, DEF: 0, MID: 0, FWD: 0, …(p.posHistory || {}) };
Object.entries(delta[p.id]).forEach(([role, n]) => { ph[role] = (ph[role] || 0) + n; });
return { …p, posHistory: ph };
}));
};

// ── Build slotLog from a posMap + formation (starting 11) ───────────────────
const buildSlotLog = (pm, fmtSlots) => {
const log = [];
Object.entries(pm).forEach(([pid, slotId]) => {
const slot = fmtSlots.find(s => s.id === slotId);
if (slot) log.push({ pid: Number(pid) || pid, role: slot.role });
});
return log;
};

// ── Start game ────────────────────────────────────────────────────────────
const startGame = (usePreview = false, plan = null) => {
const { posMap: pm, starters, bench, subs } = plan
? { posMap: plan.h1Plan.posMap, starters: plan.h1Plan.starters, bench: plan.h1Plan.bench, subs: plan.h1Subs }
: (usePreview && preview) ? preview : buildAll();
setOnField(starters); setOnBench(bench);
setPosMap(pm); setSubSchedule(subs);
setCompletedSubs([]); setElapsed(0);
setHalf(1); setHalftime(false); setGameOver(false); setGameActive(true); setPaused(false);
setSessionTime({}); sessionRef.current = {};
slotLogRef.current = buildSlotLog(pm, formation.slots);
const gkSlot = formation.slots.find(s => s.role === “GK”);
const gkId   = gkSlot ? Object.entries(pm).find(([sid]) => sid === gkSlot.id)?.[1] : null;
setH1GkId(gkId ? Number(gkId) : null);
setGameLog([`⚽ Kick off! ${formation.label} · ${present.length} players`]);
alertedSubRef.current = new Set();
setOurScore(0); setTheirScore(0);
setPreview(null); setView(“game”);
};

// ── Timer ──────────────────────────────────────────────────────────────────
useEffect(() => {
if (!gameActive || halftime || gameOver || paused) { clearInterval(timerRef.current); return; }
timerRef.current = setInterval(() => {
setElapsed(e => {
const next = e + 1;
if (next >= HALF_DURATION) {
clearInterval(timerRef.current);
if (half === 1) {
setHalftime(true);
setGameLog(l => […l, “⏸ Halftime!”]);
commitPosHistory(slotLogRef.current);
slotLogRef.current = [];
} else {
setGameOver(true); setGameActive(false);
setGameLog(l => […l, “🏁 Full time!”]);
commitPosHistory(slotLogRef.current);
slotLogRef.current = [];
setPlayers(ps => ps.map(p => ({
…p,
totalTime: (p.totalTime || 0) + (sessionRef.current[p.id] || 0),
games:     (p.games     || 0) + (sessionRef.current[p.id] > 0 ? 1 : 0),
})));
}
}
return next;
});
}, 1000);
return () => clearInterval(timerRef.current);
}, [gameActive, halftime, gameOver, half, paused]);

// ── Per-second tick: track time + trigger auto subs ───────────────────────
useEffect(() => {
if (!gameActive || halftime || gameOver || paused) return;
fieldRef.current.forEach(id => { sessionRef.current[id] = (sessionRef.current[id] || 0) + 1; });
setSessionTime({ …sessionRef.current });
const minute  = Math.floor(elapsed / 60);
const pending = subSchedule.filter(s =>
s.minute <= minute && !completedSubs.some(c => c.minute === s.minute && c.outId === s.outId)
);
if (pending.length) {
pending.forEach(sub => {
setOnField(f => f.map(id => id === sub.outId ? sub.inId : id));
setOnBench(b => b.map(id => id === sub.inId  ? sub.outId : id));
setPosMap(pm => { const u = { …pm }; delete u[sub.outId]; u[sub.inId] = sub.slot; return u; });
setGameLog(l => […l, `🔄 ${getName(sub.inId)} on for ${getName(sub.outId)} @ ${sub.slot} (${sub.minute}′)`]);
setCompletedSubs(c => […c, sub]);
// Record the incoming player’s position in the slot log
const slotDef = formation.slots.find(s => s.id === sub.slot);
if (slotDef) slotLogRef.current.push({ pid: sub.inId, role: slotDef.role });
});
}
}, [elapsed]);

// ── Sub alert: vibrate + beep when a sub is imminent (within 10s) ─────────
const alertedSubRef = useRef(new Set());
useEffect(() => {
if (!gameActive || paused || halftime || gameOver) return;
const upcoming = subSchedule.find(s =>
!completedSubs.some(c => c.minute === s.minute && c.outId === s.outId) &&
!alertedSubRef.current.has(`${s.minute}:${s.outId}`)
);
if (!upcoming) return;
const secsLeft = upcoming.minute * 60 - elapsed;
if (secsLeft <= 10 && secsLeft >= 0) {
alertedSubRef.current.add(`${upcoming.minute}:${upcoming.outId}`);
// Vibrate if supported
if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
// Audio beep
try {
const ctx = new (window.AudioContext || window.webkitAudioContext)();
[0, 0.25].forEach(t => {
const osc = ctx.createOscillator(); const gain = ctx.createGain();
osc.connect(gain); gain.connect(ctx.destination);
osc.frequency.value = 880; gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.2);
});
} catch {}
}
}, [elapsed, gameActive, paused, halftime, gameOver, subSchedule, completedSubs]);

const startH2 = () => {
const { posMap: pm, starters, bench, subs } = buildAll(sessionRef.current, h1GkId);
setOnField(starters); setOnBench(bench);
setPosMap(pm); setSubSchedule(subs);
alertedSubRef.current = new Set();
setCompletedSubs([]); setElapsed(0); setHalf(2); setHalftime(false); setPaused(false);
slotLogRef.current = buildSlotLog(pm, formation.slots);
setGameLog(l => […l, “⚽ Second half!”]);
};

// ── Manual sub ─────────────────────────────────────────────────────────────
const doManualSub = () => {
const outId = Number(manOut) || manOut;
const inId  = Number(manIn)  || manIn;
if (!outId || !inId) return;
const slot = posRef.current[outId];
setOnField(f => f.map(id => id === outId ? inId  : id));
setOnBench(b => b.map(id => id === inId  ? outId : id));
setPosMap(pm => { const u = { …pm }; delete u[outId]; u[inId] = slot; return u; });
setGameLog(l => […l, `🔄 ${getName(inId)} on for ${getName(outId)} @ ${slot || "?"} (${Math.floor(elapsed / 60)}′ manual)`]);
const slotDef = slot ? formation.slots.find(s => s.id === slot) : null;
if (slotDef) slotLogRef.current.push({ pid: inId, role: slotDef.role });
setManOut(””); setManIn(””);
};

const resetGame = (mode = “reset”) => {
clearInterval(timerRef.current);
if (mode === “stop”) {
setGameActive(false); setGameOver(true); setPaused(false);
setGameLog(l => […l, “🛑 Game ended manually”]);
} else {
setGameActive(false); setPaused(false);
setHalf(1); setElapsed(0); setHalftime(false); setGameOver(false);
setOnField([]); setOnBench([]); setPosMap({}); setSubSchedule([]);
setCompletedSubs([]); setSessionTime({}); sessionRef.current = {};
slotLogRef.current = []; alertedSubRef.current = new Set();
setGameLog([]); setManOut(””); setManIn(””); setTapSubOut(null);
setOurScore(0); setTheirScore(0);
if (mode === “delete”) { setSavedPlan(null); setActiveGameId(null); }
}
};

const minute  = Math.floor(elapsed / 60);
const pct     = Math.min((elapsed / HALF_DURATION) * 100, 100);
const hasGame = gameActive || halftime || gameOver;
const nextSub = subSchedule.find(s => !completedSubs.some(c => c.minute === s.minute && c.outId === s.outId));

// ─── Render ────────────────────────────────────────────────────────────────
return (

    <div style={{ display: "flex", flex: 1 }}>
      {[["roster","Roster"],["schedule","Schedule"],["lineup","Lineup"],["game","Game"],["history","Stats"]].map(([v, l]) => (
        <button key={v} className={`tab${view === v ? " on" : ""}`} onClick={() => setView(v)}>{l}</button>
      ))}
    </div>
    {hasGame && (
      <div style={{ display: "flex", alignItems: "center", gap: 8, paddingLeft: 12, flexShrink: 0 }}>
        {gameActive && <span className={paused ? "" : "pulse"} style={{ width: 7, height: 7, borderRadius: "50%", background: paused ? "#9ca3af" : "#dc2626", display: "inline-block" }} />}
        <span style={{ fontWeight: 700, fontSize: 15, color: halftime ? "#d97706" : gameOver ? "#d4a017" : "#111827", fontFamily: "'DM Mono',monospace" }}>
          {halftime ? "Half Time" : gameOver ? "Full Time" : `H${half} · ${fmt(elapsed)}`}
        </span>
      </div>
